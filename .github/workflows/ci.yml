name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  typecheck-and-build:
    name: Typecheck & Build (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["22.x", "24.x"]

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Verify binary
        run: |
          test -f dist/index.js || (echo "dist/index.js not found" && exit 1)
          test -x dist/index.js || (echo "dist/index.js not executable" && exit 1)
          head -1 dist/index.js | grep -q "node" || (echo "Missing shebang" && exit 1)
          echo "Binary OK"

      - name: Secret scan
        run: |
          if grep -rE '[a-f0-9]{64}' . --exclude-dir=node_modules --exclude-dir=.git --exclude-dir=dist; then
            echo "ERROR: Potential secret found in repository"
            exit 1
          fi
          echo "Secret scan clean"
